<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BYD Analyzer Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 text-gray-100 font-sans p-4 md:p-10">

    <div class="max-w-4xl mx-auto">
        <header class="mb-10 border-l-4 border-green-500 pl-4 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold italic">BYD ANALYZER <span class="text-green-500 text-sm">v3.0 (Cloud)</span></h1>
                <p class="text-gray-500 text-sm">Simulação de TCO & Lucratividade Real</p>
            </div>
            <div class="text-right">
                <span id="saveStatus" class="text-[10px] bg-blue-900 text-blue-200 px-2 py-1 rounded opacity-0 transition-opacity">DADOS SALVOS</span>
            </div>
        </header>

        <div class="grid md:grid-cols-2 gap-8">
            <div class="bg-gray-900 p-6 rounded-2xl shadow-2xl border border-gray-800 space-y-4">
                <h2 class="text-sm font-black text-gray-500 uppercase tracking-widest mb-4">Parâmetros Operacionais</h2>
                
                <div class="grid grid-cols-2 gap-4">
                    <label class="block"><span class="text-xs text-gray-500">Capital Total</span><input type="number" id="capTotal" class="w-full bg-gray-800 border-none rounded-lg p-2 mt-1 focus:ring-2 ring-green-500 outline-none"></label>
                    <label class="block"><span class="text-xs text-gray-500">Entrada</span><input type="number" id="entrada" class="w-full bg-gray-800 border-none rounded-lg p-2 mt-1 focus:ring-2 ring-green-500 outline-none"></label>
                </div>

                <label class="block"><span class="text-xs text-gray-500">Valor do Veículo</span><input type="number" id="valorCarro" class="w-full bg-gray-800 border-none rounded-lg p-2 mt-1 focus:ring-2 ring-green-500 outline-none"></label>
                
                <div class="grid grid-cols-2 gap-4">
                    <label class="block"><span class="text-xs text-gray-500">Faturamento Mensal</span><input type="number" id="faturamento" class="w-full bg-gray-800 border-none rounded-lg p-2 mt-1 focus:ring-2 ring-green-500 outline-none font-bold text-green-400"></label>
                    <label class="block"><span class="text-xs text-gray-500">Parcela Finan.</span><input type="number" id="parcela" class="w-full bg-gray-800 border-none rounded-lg p-2 mt-1 focus:ring-2 ring-orange-500 outline-none text-orange-200"></label>
                </div>

                <div class="grid grid-cols-3 gap-2">
                    <label class="block"><span class="text-[10px] text-gray-500 uppercase">Seguro</span><input type="number" id="seguro" class="w-full bg-gray-800 border-none rounded-lg p-2 mt-1 focus:ring-1 ring-gray-600 outline-none text-sm"></label>
                    <label class="block"><span class="text-[10px] text-gray-500 uppercase">Manut</span><input type="number" id="manut" class="w-full bg-gray-800 border-none rounded-lg p-2 mt-1 focus:ring-1 ring-gray-600 outline-none text-sm"></label>
                    <label class="block"><span class="text-[10px] text-gray-500 uppercase">Energia</span><input type="number" id="energia" class="w-full bg-gray-800 border-none rounded-lg p-2 mt-1 focus:ring-1 ring-gray-600 outline-none text-sm"></label>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <label class="block"><span class="text-xs text-gray-500">KM Mensal</span><input type="number" id="kmMensal" class="w-full bg-gray-800 border-none rounded-lg p-2 mt-1 outline-none"></label>
                    <label class="block"><span class="text-xs text-gray-500">Depreciação (ex: 0.15)</span><input type="number" id="depAnual" step="0.01" class="w-full bg-gray-800 border-none rounded-lg p-2 mt-1 outline-none text-blue-400 font-bold"></label>
                </div>
            </div>

            <div class="space-y-6">
                <div class="bg-gradient-to-br from-gray-900 to-black p-8 rounded-3xl border border-green-900/30 shadow-2xl">
                    <h2 class="text-green-500 text-xs font-bold uppercase tracking-widest mb-6">Faturamento Real (Líquido)</h2>
                    <div id="resReal" class="text-5xl font-black text-white mb-2">R$ 0,00</div>
                    <p class="text-gray-500 text-xs italic font-serif">Já descontando a depreciação de mercado do ativo.</p>
                    
                    <div class="mt-10 grid grid-cols-2 gap-4 border-t border-gray-800 pt-6">
                        <div>
                            <span class="text-[10px] text-gray-500 uppercase block">Custo p/ KM</span>
                            <span id="resCPK" class="text-xl font-bold text-gray-200 font-mono">R$ 0,00</span>
                        </div>
                        <div>
                            <span class="text-[10px] text-gray-500 uppercase block">Margem Bruta</span>
                            <span id="resCaixa" class="text-xl font-bold text-gray-200 font-mono text-blue-400">R$ 0,00</span>
                        </div>
                    </div>
                </div>

                <div id="statusTag" class="py-4 text-center rounded-xl font-black uppercase text-sm tracking-widest transition-all duration-500">
                    Calculando...
                </div>
            </div>
        </div>
    </div>

    <script>
        const inputs = ['capTotal', 'entrada', 'valorCarro', 'faturamento', 'parcela', 'seguro', 'manut', 'energia', 'kmMensal', 'depAnual'];
        
        const saveToLocal = (data) => {
            localStorage.setItem('byd_sim_data', JSON.stringify(data));
            const status = document.getElementById('saveStatus');
            status.style.opacity = '1';
            setTimeout(() => status.style.opacity = '0', 1000);
        };

        const calcular = () => {
            const data = {};
            inputs.forEach(id => data[id] = parseFloat(document.getElementById(id).value) || 0);

            const custosFisicos = data.parcela + data.seguro + data.manut + data.energia;
            const depMensal = (data.valorCarro * data.depAnual) / 12;
            const lucroReal = data.faturamento - custosFisicos - depMensal;
            const cpk = (custosFisicos + depMensal) / (data.kmMensal || 1);

            document.getElementById('resReal').innerText = `R$ ${lucroReal.toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('resCaixa').innerText = `R$ ${(data.faturamento - custosFisicos).toLocaleString('pt-BR', {minimumFractionDigits: 2})}`;
            document.getElementById('resCPK').innerText = `R$ ${cpk.toFixed(2)}`;

            const tag = document.getElementById('statusTag');
            if(lucroReal > 3500) { tag.innerText = "Alta Performance"; tag.className = "py-4 text-center rounded-xl font-black uppercase text-sm tracking-widest bg-green-500 text-green-950 shadow-lg shadow-green-500/20"; }
            else if(lucroReal > 1000) { tag.innerText = "Sustentável"; tag.className = "py-4 text-center rounded-xl font-black uppercase text-sm tracking-widest bg-yellow-500 text-yellow-950 shadow-lg shadow-yellow-500/20"; }
            else { tag.innerText = "Risco Técnico"; tag.className = "py-4 text-center rounded-xl font-black uppercase text-sm tracking-widest bg-red-600 text-white shadow-lg shadow-red-500/20"; }

            saveToLocal(data);
        };

        // Carregar dados salvos
        const saved = JSON.parse(localStorage.getItem('byd_sim_data'));
        if(saved) inputs.forEach(id => document.getElementById(id).value = saved[id] || document.getElementById(id).value);

        inputs.forEach(id => document.getElementById(id).addEventListener('input', calcular));
        calcular();
    </script>
</body>
</html>
